name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 23
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Lint
        run: npx next lint

      - name: Run unit tests
        run: npx vitest run --exclude tests/unit/usePreset.test.ts
