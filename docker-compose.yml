# Local development stack.
# Setup: cp .env.dev.example .env.dev  (edit credentials)
# Start: docker compose --env-file .env.dev up -d --build
# Init:  bash scripts/garage-init.sh
services:
  app:
    build: .
    ports:
      - "${APP_PORT:-3320}:3000"
    env_file:
      - .env.dev
    environment:
      HOSTNAME: "0.0.0.0"
      GARAGE_ENDPOINT: http://garage:3900
    depends_on:
      - postgres
      - garage
      - mailhog

  postgres:
    image: postgres:16
    env_file:
      - .env.dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  garage:
    image: dxflrs/garage:v1.3.1
    ports:
      - "3900:3900"   # S3 API
      - "3902:3902"   # Admin API
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml:ro
    command: /garage -c /etc/garage.toml server

volumes:
  postgres_data:
  garage_data:
  garage_meta:
