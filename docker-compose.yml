services:
  # Local dev: use "npm run dev" instead of this service.
  # For production container builds, run: docker compose up app
  app:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - path: .env.local
        required: false
    environment:
      # Override DATABASE_URL to use the internal service name
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gp200
      HOSTNAME: "0.0.0.0"
      GARAGE_ENDPOINT: http://garage:3900
      GARAGE_ACCESS_KEY_ID: GKf3c3f90b5411b948e9853a44
      GARAGE_SECRET_ACCESS_KEY: "94895f063ccfa0f1759df4efd464e667a147bd720ae50cc12ca4cd583733b1ee"
      GARAGE_BUCKET: avatars
      GARAGE_PRESET_BUCKET: presets
      EMAIL_SMTP_HOST: mailhog
    depends_on:
      - postgres
      - garage
      - mailhog

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gp200
    ports:
      - "5433:5432"   # 5433 extern to avoid conflicts with other projects
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

  garage:
    image: dxflrs/garage:v1.3.1
    ports:
      - "3900:3900"   # S3 API
      - "3902:3902"   # Admin API
    volumes:
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml:ro
    command: /garage -c /etc/garage.toml server

volumes:
  postgres_data:
  garage_data:
  garage_meta:
